syntax = "proto3";

package beluga.v1;

option go_package = "github.com/collinpfeifer/beluga/internal/belugav1";

// ---------------------------------------------------------------------------
// Remora Service
//
// The remora daemon (on remote hosts) is the CLIENT.
// Beluga (main daemon) is the SERVER.
// The remora initiates a bidirectional streaming connection so
// no inbound ports are needed on the remote host.
// ---------------------------------------------------------------------------

service RemoraService {
  // Bidirectional stream: remora connects and keeps the stream alive.
  // Beluga sends commands through the stream; the remora responds
  // with output, heartbeats, and directory sync data.
  rpc Connect(stream RemotaMessage) returns (stream BelugaCommand);

  // Unary fallback: execute a single command on the remote host.
  rpc ExecuteCommand(ExecuteCommandRequest) returns (ExecuteCommandResponse);

  // Unary: trigger a directory sync from the remote host.
  rpc SyncDirectory(SyncDirectoryRequest) returns (SyncDirectoryResponse);
}

// ---------------------------------------------------------------------------
// Remote Extension Host Service
//
// External processes connect to Beluga and register their tools.
// ---------------------------------------------------------------------------

service ExtensionHostService {
  // Bidirectional stream for remote extension communication.
  rpc Connect(stream ExtensionMessage) returns (stream HostRequest);
}

// ---------------------------------------------------------------------------
// Whitelisted commands
// ---------------------------------------------------------------------------

enum CommandType {
  COMMAND_TYPE_UNSPECIFIED      = 0;
  GREP                          = 1;
  AWK                           = 2;
  FIND                          = 3;
  CAT                           = 4;
  READ_FILE                     = 5;
  TAIL                          = 6;
  SYSTEMCTL_STATUS              = 7;
  JOURNALCTL                    = 8;
}

// ---------------------------------------------------------------------------
// Bidirectional stream messages (Remora)
// ---------------------------------------------------------------------------

// Sent FROM remota TO beluga.
message RemotaMessage {
  oneof payload {
    Heartbeat          heartbeat       = 1;
    CommandOutput      command_output  = 2;
    DirectoryChunk     directory_chunk = 3;
    Registration       registration    = 4;
  }
}

// Sent FROM beluga TO remota.
message BelugaCommand {
  oneof payload {
    ExecuteCommandRequest  execute_command  = 1;
    SyncDirectoryRequest   sync_directory   = 2;
  }
}

// ---------------------------------------------------------------------------
// Registration (first message on connect)
// ---------------------------------------------------------------------------

message Registration {
  string host_id     = 1; // unique identifier for this remote host
  string hostname    = 2;
  repeated string allowed_directories = 3;
}

// ---------------------------------------------------------------------------
// Heartbeat
// ---------------------------------------------------------------------------

message Heartbeat {
  int64  timestamp_ms = 1;
}

// ---------------------------------------------------------------------------
// Command execution
// ---------------------------------------------------------------------------

message ExecuteCommandRequest {
  string      request_id = 1;
  CommandType command    = 2;
  repeated string args   = 3;
  string      working_dir = 4; // must be within allowed directories
  int32       timeout_seconds = 5;
}

message ExecuteCommandResponse {
  string request_id  = 1;
  int32  exit_code   = 2;
  string stdout      = 3;
  string stderr      = 4;
  bool   timeout     = 5;
}

message CommandOutput {
  string request_id = 1; // matches ExecuteCommandRequest.request_id
  int32  exit_code  = 2;
  string stdout     = 3;
  string stderr     = 4;
  bool   timeout    = 5;
}

// ---------------------------------------------------------------------------
// Directory sync
// ---------------------------------------------------------------------------

message SyncDirectoryRequest {
  string request_id    = 1;
  string directory     = 2; // must be within allowed directories
}

message SyncDirectoryResponse {
  string       request_id  = 1;
  repeated FileInfo files  = 2;
  bytes         tar_data   = 3; // tar archive of the directory
}

message DirectoryChunk {
  string request_id = 1;
  oneof data {
    FileInfo  file_info = 2;
    bytes     chunk     = 3; // chunk of tar data
    bool      done      = 4; // signals end of transfer
  }
}

message FileInfo {
  string path         = 1;
  int64  size         = 2;
  string checksum_sha256 = 3;
}

// ---------------------------------------------------------------------------
// Remote Extension Host messages
// ---------------------------------------------------------------------------

// Sent FROM remote extension TO beluga.
message ExtensionMessage {
  oneof payload {
    ExtensionRegistration registration = 1;
    ToolResult           tool_result  = 2;
  }
}

// Sent FROM beluga TO remote extension.
message HostRequest {
  oneof payload {
    ExecuteTool execute_tool = 1;
  }
}

// Remote extension registration.
message ExtensionRegistration {
  string extension_name = 1;
  repeated ToolDefinition tools = 2;
}

// Tool definition from a remote extension.
message ToolDefinition {
  string name        = 1;
  string description = 2;
  string parameters  = 3; // JSON Schema as string
}

// Beluga asks the remote extension to execute a tool.
message ExecuteTool {
  string call_id    = 1;
  string tool_name  = 2;
  string arguments  = 3; // JSON args as string
}

// Remote extension returns the tool result.
message ToolResult {
  string call_id  = 1;
  string output   = 2;
  bool   is_error = 3;
}
